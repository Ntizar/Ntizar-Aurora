<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aurora v5.1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.themes.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.patterns.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.next.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.viz.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.motion.css">
  <style>
    /* ===== Shell de la página ===== */
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    /* Fondo aurora sutil */
    .login-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, var(--nz-surface-glass-brand) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, var(--nz-surface-glass-accent) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 26rem;
    }
    .login-shell .nz-card {
      border-radius: var(--nz-radius-xl);
    }
    .login-shell .nz-card__body {
      padding: 2.5rem;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .login-brand__icon {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--nz-radius-md);
      background: var(--nz-gradient-brand);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: var(--nz-shadow-brand);
    }
    .login-brand__name {
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--nz-text-strong);
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--nz-text-muted);
      font-size: var(--nz-text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--nz-border-soft);
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px solid var(--nz-border-soft);
      border-radius: var(--nz-radius-md);
      background: var(--nz-surface-base);
      color: var(--nz-text-default);
      font-family: var(--nz-font-sans);
      font-size: var(--nz-text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--nz-duration-base) var(--nz-ease-standard),
                  border-color var(--nz-duration-base) var(--nz-ease-standard);
    }
    .social-btn:hover {
      background: var(--nz-surface-soft);
      border-color: var(--nz-border-default);
    }
    .social-btn svg {
      width: 1.1rem;
      height: 1.1rem;
      flex-shrink: 0;
    }
    .login-shell .nz-input {
      width: 100%;
    }
    .login-shell .nz-field {
      display: block;
    }
    @media (max-width: 600px) {
      .login-shell { padding: 1rem; }
      .login-shell .nz-card__body { padding: 1.5rem; }
    }
  </style>
</head>
<body class="nz" data-nz-theme="light" data-nz-skin="aurora">
  <div class="login-shell">
    <div class="login-card">
      <div class="nz-card nz-card--glass">
        <div class="nz-card__body">
          <!-- Brand -->
          <div class="login-brand">
            <div class="login-brand__icon">A</div>
            <span class="login-brand__name">Aurora</span>
          </div>

          <!-- Header -->
          <h2 class="nz-text-h3" style="margin:0 0 0.25rem;">Bienvenido de nuevo</h2>
          <p class="u-nz-text-muted" style="margin:0 0 1.5rem;">Entra a tu cuenta para continuar.</p>

          <!-- Social login -->
          <button class="social-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0116.5 0"/></svg>
            Continuar con Google
          </button>

          <div class="login-divider">o</div>

          <!-- Email form -->
          <form onsubmit="event.preventDefault()">
            <div class="nz-field" style="margin-bottom:1rem;">
              <span class="nz-field__label">Email</span>
              <input class="nz-input" type="email" placeholder="tu@email.com">
            </div>
            <div class="nz-field" style="margin-bottom:1rem;">
              <span class="nz-field__label">Contraseña</span>
              <input class="nz-input" type="password" placeholder="••••••••">
            </div>

            <div class="nz-cluster" style="justify-content:space-between; margin-bottom:1.5rem;">
              <label class="nz-check">
                <input type="checkbox" checked>
                <span class="nz-text-sm">Recordarme</span>
              </label>
              <a href="#" class="nz-text-sm u-nz-text-muted">¿Olvidaste tu clave?</a>
            </div>

            <button class="nz-btn nz-btn--primary nz-btn--block" type="submit">Entrar</button>
          </form>

          <!-- Footer -->
          <p style="text-align:center; margin:1.5rem 0 0; font-size:var(--nz-text-sm); color:var(--nz-text-muted);">
            ¿No tienes cuenta? <a href="#" style="color:var(--nz-color-brand); text-decoration:none; font-weight:600;">Crear cuenta</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
