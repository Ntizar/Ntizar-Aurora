<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aurora</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.themes.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.patterns.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--nz-surface-page);
    }
  </style>
</head>
<body class="nz" data-nz-theme="light" data-nz-skin="aurora">
  <div class="login-wrapper">
    <div class="nz-card" style="width: 100%; max-width: 24rem;">
      <div class="nz-card__body" style="padding: 2rem;">
        <h2 class="nz-text-h2" style="text-align: center; margin-bottom: var(--nz-space-5);">Bienvenido</h2>
        <form>
          <div class="nz-field" style="margin-bottom: var(--nz-space-4);">
            <label class="nz-label" for="email">Email</label>
            <input class="nz-input" id="email" type="email" placeholder="tu@email.com">
          </div>
          <div class="nz-field" style="margin-bottom: var(--nz-space-4);">
            <label class="nz-label" for="password">Contraseña</label>
            <input class="nz-input" id="password" type="password" placeholder="••••••••">
          </div>
          <button class="nz-btn nz-btn--primary" style="width: 100%; margin-bottom: var(--nz-space-4);">Iniciar sesión</button>
          <div style="text-align: center;">
            <a class="u-nz-text-muted" href="#">¿Olvidaste tu contraseña?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
