<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Aurora</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.themes.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.data.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.charts.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.ui.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Ntizar/Ntizar-Aurora@master/ntizar.patterns.css">
</head>
<body class="nz" data-nz-theme="light" data-nz-skin="aurora">
  <div class="nz-app-shell">
    <aside class="nz-app-shell__sidebar">
      <nav class="nz-nav-section">
        <a class="nz-nav-item is-active" href="#">Dashboard</a>
        <a class="nz-nav-item" href="#">Analíticas</a>
        <a class="nz-nav-item" href="#">Configuración</a>
      </nav>
    </aside>
    <main class="nz-app-shell__main">
      <header class="nz-app-shell__header">
        <h1 class="nz-text-h3">Dashboard</h1>
      </header>
      <div class="nz-section">
        <!-- KPIs -->
        <div class="nz-stat-grid--4" style="margin-bottom: var(--nz-space-6);">
          <div class="nz-stat-tile">
            <div class="nz-stat-tile__label">Usuarios</div>
            <div class="nz-stat-tile__value">12,847</div>
            <div class="nz-stat-tile__trend nz-trend-arrow--up">+12.5%</div>
          </div>
          <div class="nz-stat-tile">
            <div class="nz-stat-tile__label">Ingresos</div>
            <div class="nz-stat-tile__value">€48,290</div>
            <div class="nz-stat-tile__trend nz-trend-arrow--up">+8.2%</div>
          </div>
          <div class="nz-stat-tile">
            <div class="nz-stat-tile__label">Pedidos</div>
            <div class="nz-stat-tile__value">1,284</div>
            <div class="nz-stat-tile__trend nz-trend-arrow--down">-3.1%</div>
          </div>
          <div class="nz-stat-tile">
            <div class="nz-stat-tile__label">Conversión</div>
            <div class="nz-stat-tile__value">4.7%</div>
            <div class="nz-stat-tile__trend nz-trend-arrow--up">+0.8%</div>
          </div>
        </div>
        
        <!-- Chart -->
        <div class="nz-card" style="margin-bottom: var(--nz-space-5);">
          <div class="nz-card__header">
            <h3 class="nz-text-lg">Ingresos mensuales</h3>
          </div>
          <div class="nz-card__body">
            <div class="nz-chart--lg">
              <!-- Chart.js canvas aquí -->
              <canvas id="revenue-chart"></canvas>
            </div>
          </div>
        </div>
        
        <!-- Table -->
        <div class="nz-card">
          <div class="nz-card__header">
            <h3 class="nz-text-lg">Últimas transacciones</h3>
          </div>
          <div class="nz-card__body">
            <table class="nz-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Cliente</th>
                  <th>Importe</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>#1234</td>
                  <td>María García</td>
                  <td>€249.00</td>
                  <td><span class="nz-badge--success">Completado</span></td>
                </tr>
                <tr>
                  <td>#1235</td>
                  <td>Carlos López</td>
                  <td>€189.50</td>
                  <td><span class="nz-badge--warning">Pendiente</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
